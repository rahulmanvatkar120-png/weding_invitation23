<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Janhavi & Rahul</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4BC;
            --gold-dark: #B8962F;
            --cream: #FFFBF0;
            --Burgundy: #722F37;
            --deep-red: #8B0000;
            --text-dark: #2C2C2C;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: url('background.JPG') no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Main Container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Transparent Invitation Card */
        .invitation-card {
            background: rgba(255, 251, 240, 0.75);
            backdrop-filter: blur(8px);
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--gold);
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .scripture-text {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: var(--Burgundy);
            margin-bottom: 10px;
        }

        .couple-names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-dark);
            margin: 15px 0;
            line-height: 1.2;
        }

        .couple-names .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: var(--gold-dark);
            display: block;
            margin: 5px 0;
        }

        .event-details {
            margin: 20px 0;
            font-size: 1rem;
            color: var(--text-dark);
        }

        .detail-row {
            margin: 10px 0;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--Burgundy);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Cormorant Garamond', serif;
        }

        .btn-rsvp {
            background: var(--Burgundy);
            color: white;
        }

        .btn-rsvp:hover {
            background: var(--deep-red);
        }

        .btn-nav {
            background: var(--gold);
            color: var(--text-dark);
        }

        .btn-nav:hover {
            background: var(--gold-dark);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .invitation-card {
                padding: 20px;
                margin: 10px;
            }
            .couple-names {
                font-size: 2rem;
            }
            .scripture-text {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .invitation-card {
                padding: 15px;
            }
            .couple-names {
                font-size: 1.5rem;
            }
            .scripture-text {
                font-size: 1.1rem;
            }
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="invitation-card">
            <p class="scripture-text">"Two become one"</p>
            
            <h1 class="couple-names">
                Janhavi
                <span class="ampersand">&</span>
                Rahul
            </h1>
            
            <div class="event-details">
                <div class="detail-row">
                    <span class="detail-label">Date</span><br>
                    <span class="detail-value">26th April 2026</span>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Time</span><br>
                    <span class="detail-value">07:30 PM</span>
                </div>
            </div>
            
            <div class="button-group">
                <a href="#rsvp" class="btn btn-rsvp">RSVP</a>
                <a href="wedding-ceremony.html" class="btn btn-nav">Ceremony</a>
                <a href="wedding-3d-viewer.html" class="btn btn-nav">3D Temple</a>
            </div>
        </div>
    </div>
</body>
</html>
