<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Janhavi & Rahul</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #F7C59F;
            --accent: #2EC4B6;
            --dark: #1A1A2E;
            --light: #FFF8F0;
            --gold: #FFD700;
            --sky: #87CEEB;
            --temple-roof: #E74C3C;
            --temple-wall: #F4A460;
            --temple-border: #8B4513;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, var(--sky) 0%, var(--light) 50%, var(--secondary) 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cartoon Temple Container */
        .temple-hero {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 45vh;
            position: relative;
            overflow: hidden;
        }

        /* Cartoon Temple - Pure CSS */
        .cartoon-temple {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Temple Dome */
        .temple-dome {
            width: 120px;
            height: 80px;
            background: var(--temple-roof);
            border-radius: 60px 60px 0 0;
            position: relative;
            border: 4px solid var(--temple-border);
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.2);
        }

        .temple-dome::before {
            content: '';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: var(--gold);
            border-radius: 50% 50% 50% 0;
            transform: translateX(-50%) rotate(45deg);
            border: 3px solid var(--temple-border);
        }

        .temple-dome::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: var(--temple-wall);
            border: 3px solid var(--temple-border);
            border-radius: 5px 5px 0 0;
        }

        /* Main Temple Building */
        .temple-building {
            width: 200px;
            height: 120px;
            background: var(--temple-wall);
            border: 4px solid var(--temple-border);
            border-radius: 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Temple Pillars */
        .pillars {
            display: flex;
            gap: 15px;
            margin-bottom: 0;
        }

        .pillar {
            width: 20px;
            height: 100px;
            background: linear-gradient(90deg, #DEB887 0%, var(--temple-wall) 50%, #DEB887 100%);
            border: 2px solid var(--temple-border);
            border-radius: 3px;
        }

        /* Temple Entrance */
        .entrance {
            position: absolute;
            bottom: 0;
            width: 50px;
            height: 60px;
            background: #4A3728;
            border: 3px solid var(--temple-border);
            border-bottom: none;
            border-radius: 25px 25px 0 0;
        }

        /* Temple Base/Steps */
        .temple-base {
            width: 240px;
            height: 25px;
            background: var(--temple-border);
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
        }

        .step {
            width: 100%;
            height: 8px;
            background: var(--temple-border);
            border-radius: 2px;
            margin: 2px;
        }

        /* Decorative Elements */
        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,107,53,0.5);
            animation: bloom 2s ease-in-out infinite;
        }

        .flower:nth-child(1) { top: 10%; left: 10%; }
        .flower:nth-child(2) { top: 15%; right: 15%; }
        .flower:nth-child(3) { bottom: 20%; left: 20%; }
        .flower:nth-child(4) { bottom: 25%; right: 10%; }

        @keyframes bloom {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: cloudMove 20s linear infinite;
        }

        .cloud-1 {
            width: 100px;
            height: 40px;
            top: 10%;
            left: -100px;
            animation-delay: 0s;
        }

        .cloud-2 {
            width: 80px;
            height: 30px;
            top: 20%;
            left: -80px;
            animation-delay: -10s;
        }

        .cloud-3 {
            width: 120px;
            height: 50px;
            top: 5%;
            left: -120px;
            animation-delay: -5s;
        }

        @keyframes cloudMove {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            padding: 0 20px 40px;
        }

        /* Invitation Card */
        .invitation-card {
            background: linear-gradient(145deg, #ffffff 0%, var(--light) 100%);
            max-width: 600px;
            margin: 0 auto;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 
                        0 0 0 3px var(--primary),
                        0 0 0 6px var(--gold);
            position: relative;
            overflow: hidden;
        }

        .invitation-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--gold), var(--accent), var(--gold), var(--primary));
        }

        /* Card Content */
        .content {
            text-align: center;
            padding: 20px;
        }

        .invite-label {
            font-size: 0.9rem;
            color: var(--primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .scripture-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .couple-names {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--dark);
            margin: 20px 0;
            line-height: 1.3;
        }

        .and-text {
            font-size: 1rem;
            color: var(--primary);
            margin: 10px 0;
            font-weight: 500;
        }

        .event-details {
            background: rgba(255, 107, 53, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 25px 0;
            border: 2px dashed var(--primary);
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .detail-icon {
            font-size: 1.3rem;
        }

        .detail-text {
            font-size: 1rem;
            color: var(--dark);
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .venue-section {
            background: rgba(46, 196, 182, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid var(--accent);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #FF8C5A 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent) 0%, #4EEADC 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(46, 196, 182, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(46, 196, 182, 0.5);
        }

        /* QR Section */
        .qr-section {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed var(--secondary);
        }

        .qr-code {
            width: 100px;
            height: 100px;
            border: 4px solid var(--gold);
            border-radius: 10px;
            padding: 5px;
            background: white;
        }

        .qr-text {
            font-size: 0.8rem;
            color: var(--dark);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .temple-hero {
                min-height: 35vh;
            }

            .temple-dome {
                width: 80px;
                height: 55px;
            }

            .temple-dome::before {
                width: 20px;
                height: 20px;
                top: -18px;
            }

            .temple-dome::after {
                width: 28px;
                height: 35px;
            }

            .temple-building {
                width: 140px;
                height: 85px;
            }

            .pillar {
                width: 14px;
                height: 70px;
            }

            .entrance {
                width: 35px;
                height: 42px;
            }

            .temple-base {
                width: 170px;
                height: 18px;
            }

            .pillars {
                gap: 10px;
            }

            .couple-names {
                font-size: 2rem;
            }

            .scripture-text {
                font-size: 1.4rem;
            }

            .invitation-card {
                padding: 20px;
                margin: 0 10px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .temple-hero {
                min-height: 30vh;
            }

            .temple-dome {
                width: 60px;
                height: 40px;
            }

            .temple-dome::before {
                width: 15px;
                height: 15px;
                top: -14px;
            }

            .temple-dome::after {
                width: 20px;
                height: 25px;
            }

            .temple-building {
                width: 100px;
                height: 60px;
            }

            .pillar {
                width: 10px;
                height: 50px;
            }

            .entrance {
                width: 25px;
                height: 30px;
            }

            .temple-base {
                width: 120px;
                height: 14px;
            }

            .pillars {
                gap: 6px;
            }

            .couple-names {
                font-size: 1.6rem;
            }

            .invite-label {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }

            .detail-row {
                flex-direction: column;
                gap: 5px;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Cartoon Temple Hero Section -->
    <div class="temple-hero">
        <div class="cartoon-temple">
            <!-- Decorative Flowers -->
            <div class="decoration">
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
                <div class="flower"></div>
            </div>
            
            <!-- Temple Dome -->
            <div class="temple-dome"></div>
            
            <!-- Main Building -->
            <div class="temple-building">
                <div class="entrance"></div>
                <div class="pillars">
                    <div class="pillar"></div>
                    <div class="pillar"></div>
                    <div class="pillar"></div>
                </div>
            </div>
            
            <!-- Base Steps -->
            <div class="temple-base">
                <div class="step"></div>
            </div>
        </div>
        
        <!-- Clouds -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="invitation-card">
            <div class="content">
                <p class="invite-label">You're Invited</p>
                
                <p class="scripture-text">"Two become one"</p>
                
                <h1 class="couple-names">
                    Janhavi<br>
                    <span class="and-text">❤️ Love & ❤️</span>
                    Rahul
                </h1>
                
                <p class="invite-label">Request Your Presence</p>
                
                <!-- Event Details -->
                <div class="event-details">
                    <div class="detail-row">
                        <span class="detail-icon">📅</span>
                        <div>
                            <span class="detail-label">Date</span>
                            <span class="detail-value">[Wedding Date]</span>
                        </div>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-icon">🕐</span>
                        <div>
                            <span class="detail-label">Time</span>
                            <span class="detail-value">[Wedding Time]</span>
                        </div>
                    </div>
                </div>
                
                <!-- Venue -->
                <div class="venue-section">
                    <div class="detail-row">
                        <span class="detail-icon">🏛️</span>
                        <div>
                            <span class="detail-label">Temple</span>
                            <span class="detail-value">[Temple Name]</span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <span class="detail-icon">📍</span>
                        <div>
                            <span class="detail-label">Address</span>
                            <span class="detail-value">[Full Address]</span>
                        </div>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="button-group">
                    <a href="#rsvp" class="btn btn-primary">📝 Send RSVP</a>
                    <a href="wedding-ceremony.html" class="btn btn-secondary">🗓️ Ceremony</a>
                    <a href="wedding-3d-viewer.html" class="btn btn-secondary">🏛️ 3D Temple</a>
                </div>
                
                <!-- QR Code -->
                <div class="qr-section">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://rahulmanvatkar120-png.github.io/weding_invitation23/&bgcolor=FFFFFF&color=1A1A2E" alt="QR Code" class="qr-code">
                    <p class="qr-text">Scan for Wedding Details</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
