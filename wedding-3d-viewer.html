<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Wedding Video | Rahul ❤ Janhavi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4BC;
            --gold-dark: #B8962F;
            --Burgundy: #722F37;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Full Screen Video Container */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        /* Video Element */
        #pre-wedding-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
        }

        /* Overlay Content */
        .overlay-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Header */
        .header-section {
            text-align: center;
            pointer-events: auto;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 25px 40px;
            align-self: center;
        }

        .couple-names {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .viewer-title {
            font-size: 1rem;
            color: var(--gold-light);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Footer */
        .footer-section {
            text-align: center;
            pointer-events: auto;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 25px 40px;
            align-self: center;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home {
            background: var(--Burgundy);
            color: white;
        }

        .btn-home:hover {
            background: #8B3A3A;
            transform: translateY(-2px);
        }

        .btn-invite {
            background: var(--gold);
            color: #000;
        }

        .btn-invite:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }

        .btn-ceremony {
            background: #2EC4B6;
            color: white;
        }

        .btn-ceremony:hover {
            background: #3EDCC8;
            transform: translateY(-2px);
        }

        /* Video Controls */
        .video-controls {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
            pointer-events: auto;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--gold-light);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.1rem;
            color: var(--gold);
            font-family: 'Dancing Script', cursive;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .couple-names {
                font-size: 2rem;
            }
            
            .header-section, .footer-section {
                padding: 15px 20px;
            }
            
            .nav-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }

            .video-controls {
                bottom: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Video...</p>
    </div>

    <!-- Video Container -->
    <div class="video-container">
        <video id="pre-wedding-video" autoplay muted loop playsinline>
            <source src="REEL02.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Video Controls -->
    <div class="video-controls">
        <button id="play-btn" class="control-btn" title="Play/Pause">▶</button>
        <button id="mute-btn" class="control-btn" title="Mute/Unmute">🔊</button>
        <button id="fullscreen-btn" class="control-btn" title="Fullscreen">⛶</button>
    </div>

    <!-- Overlay Content -->
    <div class="overlay-content">
        <!-- Header -->
        <div class="header-section">
            <h1 class="couple-names">Rahul ❤ Janhavi</h1>
            <p class="viewer-title">Pre-Wedding Video</p>
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn btn-home">🏠 Home</a>
                <a href="wedding-invitation.html" class="nav-btn btn-invite">💌 Invitation</a>
                <a href="wedding-ceremony.html" class="nav-btn btn-ceremony">🗓️ Ceremony</a>
            </div>
        </div>
    </div>

    <script>
        // Video element
        const video = document.getElementById('pre-wedding-video');
        const playBtn = document.getElementById('play-btn');
        const muteBtn = document.getElementById('mute-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Hide loading when video can play
        video.addEventListener('canplaythrough', function() {
            loadingOverlay.classList.add('hidden');
        });

        // Play/Pause toggle
        playBtn.addEventListener('click', function() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '⏸';
            } else {
                video.pause();
                playBtn.textContent = '▶';
            }
        });

        // Mute/Unmute toggle
        muteBtn.addEventListener('click', function() {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        // Fullscreen toggle
        fullscreenBtn.addEventListener('click', function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (video.paused) {
                    video.play();
                    playBtn.textContent = '⏸';
                } else {
                    video.pause();
                    playBtn.textContent = '▶';
                }
            } else if (e.code === 'KeyM') {
                video.muted = !video.muted;
                muteBtn.textContent = video.muted ? '🔇' : '🔊';
            } else if (e.code === 'KeyF') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
            }
        });
    </script>
</body>
</html>
