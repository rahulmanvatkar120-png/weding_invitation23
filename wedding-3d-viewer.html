<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Temple - 3D Viewer | Rahul ❤ Janhavi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Temple...</p>
        <p class="loading-subtext"><span id="loading-percent">0</span>%</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="error-message">
        <h3 class="error-title">Unable to Load 3D Model</h3>
        <p class="error-text">There was an issue loading the temple model. Showing a placeholder instead.</p>
        <button id="retry-btn" class="error-btn">Try Again</button>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Decorative Frame -->
    <div class="viewer-frame"></div>

    <!-- Overlay Content -->
    <div class="overlay-content">
        <!-- Header -->
        <div class="header-section">
            <h1 class="couple-names">Rahul ❤ Janhavi</h1>
            <p class="viewer-title">3D Temple Viewer</p>
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn btn-home">🏠 Home</a>
                <a href="wedding-invitation.html" class="nav-btn btn-invite">💌 Invitation</a>
                <a href="wedding-ceremony.html" class="nav-btn btn-ceremony">🗓️ Ceremony</a>
            </div>
            <p class="instructions">🖱️ Click and drag to rotate • Scroll to zoom</p>
        </div>
    </div>

    <!-- Control Buttons -->
    <div class="control-buttons">
        <button id="reset-btn" class="control-btn" title="Reset View">↺</button>
        <button id="rotate-btn" class="control-btn active" title="Toggle Auto Rotate">⟳</button>
    </div>

    <!-- Three.js and GLTFLoader from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
